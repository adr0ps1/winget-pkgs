ShortDescription: Windows IPTV player supporting M3U playlists and Xtream Codes
Description: Sabeltann is a Windows desktop application for watching live TV, movies, and series from IPTV providers. It supports M3U URLs and files, Xtream Codes API, and uses LibVLC for hardware-accelerated playback with D3D11VA. Sabeltann does not host, provide, or endorse any specific IPTV streams or content — all playlists and sources are supplied by the user.
